<!DOCTYPE html>
<html>
<head>
    <title>DevTrack AI</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: radial-gradient(circle at top, #0f172a, #020617);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #22c55e, #4ade80);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #94a3b8;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 0 40px rgba(34,197,94,0.2);
            animation: fadeIn 0.6s ease;
        }

        input {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            margin-bottom: 15px;
            background: #020617;
            color: white;
            outline: none;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(90deg, #22c55e, #4ade80);
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .stat {
            flex: 1;
        }

        .bar-container {
            width: 100%;
            height: 10px;
            background: #1e293b;
            border-radius: 10px;
            margin-top: 10px;
        }

        .bar {
            height: 10px;
            width: 0%;
            background: linear-gradient(90deg, #22c55e, #4ade80);
            border-radius: 10px;
            transition: width 1s ease;
        }

        img {
            border-radius: 50%;
            margin-top: 10px;
        }

        ul {
            text-align: left;
            margin-top: 10px;
        }

        li {
            margin: 5px 0;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }

    </style>
</head>

<body>

<div class="container">

    <h1>DevTrack AI 🚀</h1>
    <p>Analyze developers like a pro</p>

    <div class="card">
        <input id="username" placeholder="Enter GitHub username">
        <button id="analyzeBtn" onclick="analyze()">Analyze</button>
    </div>

    <div id="result"></div>

</div>

<script>
async function analyze() {
    const username = document.getElementById("username").value;
    const resultDiv = document.getElementById("result");
    const btn = document.getElementById("analyzeBtn");

    if (!username) {
        alert("Enter username");
        return;
    }

    btn.disabled = true;
    btn.innerText = "Analyzing...";

    resultDiv.innerHTML = `
        <div class="card">
            ⏳ Fetching data... (first request may take ~30s)
        </div>
    `;

    try {
        const res = await fetch(`https://devtrack-backend-z7lc.onrender.com/user/${username}`);
        const data = await res.json();

        if (!data.success) throw new Error("User not found");

        const user = data.data;
        const a = user.analysis;

        resultDiv.innerHTML = `
            <div class="card">

                <img src="${user.avatar}" width="90">
                <h2>${user.username}</h2>
                <a href="${user.profile}" target="_blank">View GitHub</a>

                <div class="stats">
                    <div class="stat"><strong>${a.total_repos}</strong><br>Repos</div>
                    <div class="stat"><strong>${a.total_stars}</strong><br>Stars</div>
                    <div class="stat"><strong>${a.top_language}</strong><br>Top</div>
                </div>

                <p style="margin-top:15px;">Dev Score: <strong>${a.dev_score}/100</strong></p>

                <div class="bar-container">
                    <div class="bar" id="bar"></div>
                </div>

                <h3 style="margin-top:20px;">Suggestions</h3>
                <ul>
                    ${user.suggestions.map(s => `<li>${s}</li>`).join("")}
                </ul>

            </div>
        `;

        setTimeout(() => {
            document.getElementById("bar").style.width = a.dev_score + "%";
        }, 100);

    } catch (err) {
        resultDiv.innerHTML = `
            <div class="card">❌ ${err.message}</div>
        `;
    }

    btn.disabled = false;
    btn.innerText = "Analyze";
}

// Enter key support
document.getElementById("username").addEventListener("keypress", function(e) {
    if (e.key === "Enter") analyze();
});
</script>

</body>
</html>
