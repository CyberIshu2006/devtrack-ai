<!DOCTYPE html>
<html>
<head>
    <title>DevTrack AI</title>

    <style>
        :root {
            --bg: linear-gradient(135deg, #e0f2fe, #f8fafc);
            --text: #0f172a;
            --card: rgba(255,255,255,0.7);
            --accent: #22c55e;
        }

        .dark {
            --bg: radial-gradient(circle at top, #0f172a, #020617);
            --text: #ffffff;
            --card: rgba(255,255,255,0.05);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            text-align: center;
            padding: 40px;
            transition: all 0.3s ease;
        }

        .container {
            max-width: 500px;
            margin: auto;
        }

        h1 {
            font-size: 42px;
            animation: pop 1s ease;
        }

        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .card {
            margin-top: 30px;
            padding: 20px;
            background: var(--card);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }

        button {
            padding: 10px 16px;
            background: var(--accent);
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
        }

        input, textarea {
            padding: 10px;
            width: 80%;
            border-radius: 8px;
            border: none;
            margin-top: 10px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
        }

        .bar-container {
            width: 100%;
            background: #334155;
            border-radius: 10px;
            margin-top: 10px;
        }

        .bar {
            height: 20px;
            background: linear-gradient(90deg, #22c55e, #4ade80);
            border-radius: 10px;
            width: 0%;
            transition: width 1s;
        }

        a {
            color: var(--accent);
        }
    </style>
</head>

<body>

<div class="container">

    <h1>DevTrack AI 🚀</h1>
    <p>Analyze GitHub profiles with smart insights</p>

    <!-- Toggle -->
    <button onclick="toggleTheme()">🌙 Toggle Mode</button>

    <!-- Disclaimer -->
    <div id="disclaimerBox" class="card">
        <p>⚠️ This tool analyzes public GitHub data. Results may not fully reflect developer skills.</p>
        <button onclick="acceptDisclaimer()">I Agree</button>
    </div>

    <!-- Main App -->
    <div id="mainApp" style="display:none;">

        <input type="text" id="username" placeholder="Enter GitHub username">
        <br>
        <button onclick="analyze()">Analyze</button>

        <div id="result"></div>

        <!-- Feedback -->
        <div class="card">
            <h3>💬 Give Feedback</h3>
            <textarea id="feedback" placeholder="Your suggestions..."></textarea>
            <br>
            <button onclick="submitFeedback()">Submit</button>
        </div>

    </div>

</div>

<script>
function toggleTheme() {
    document.body.classList.toggle("dark");
}

function acceptDisclaimer() {
    document.getElementById("disclaimerBox").style.display = "none";
    document.getElementById("mainApp").style.display = "block";
}

function submitFeedback() {
    const fb = document.getElementById("feedback").value;
    if (!fb) {
        alert("Write something first!");
        return;
    }
    alert("Thanks for your feedback!");
}

window.onbeforeunload = function () {
    return "Thanks for visiting DevTrack AI 🙏";
};

async function analyze() {
    const username = document.getElementById("username").value;

    if (!username) {
        alert("Enter a username first!");
        return;
    }

    document.getElementById("result").innerHTML = "<p>🔍 Analyzing GitHub profile...</p>";

    const response = await fetch(`http://127.0.0.1:8000/user/${username}`);
    const data = await response.json();

    if (data.error) {
        document.getElementById("result").innerHTML = `
            <div class="card">
                <h3 style="color:red;">❌ ${data.error}</h3>
            </div>
        `;
        return;
    }

    const analysis = data.analysis;

    document.getElementById("result").innerHTML = `
        <div class="card">

            <div style="text-align:center;">
                <img src="${data.avatar}" width="80" style="border-radius:50%;">
                <h2>${username}</h2>
                <a href="${data.profile}" target="_blank">View Profile</a>
            </div>

            <div class="stats">
                <div><strong>${analysis.total_repos}</strong><br>Repos</div>
                <div><strong>${analysis.total_stars}</strong><br>Stars</div>
                <div><strong>${analysis.top_language}</strong><br>Top Lang</div>
            </div>

            <p><strong>Dev Score: ${analysis.dev_score}/100</strong></p>

            <div class="bar-container">
                <div class="bar" id="scoreBar"></div>
            </div>

            <h3>Suggestions:</h3>
            <ul>
                ${data.suggestions.map(s => `<li>${s}</li>`).join("")}
            </ul>

        </div>
    `;

    setTimeout(() => {
        document.getElementById("scoreBar").style.width = analysis.dev_score + "%";
    }, 100);
}
</script>

</body>
</html>
